<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Full-bleed background layer for Icon Composer. The system applies the
       rounded-icon mask + glass material, so this fills the whole canvas.
       Light-grey -> silver vertical gradient. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F7F9"/>
      <stop offset="1" stop-color="#D4D4DA"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#g)"/>
</svg>
